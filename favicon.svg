<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#ffffff"/>
  <!-- Magnifying glass ring -->
  <circle cx="27" cy="27" r="18" stroke="#2db04b" stroke-width="6" fill="white"/>
  <!-- Rupee symbol -->
  <text x="27" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#2db04b" font-family="Arial, sans-serif">₹</text>
  <!-- Handle -->
  <line x1="40" y1="40" x2="54" y2="54" stroke="#1a2744" stroke-width="6" stroke-linecap="round"/>
</svg>
